<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rumol Biz</title>
    <style>
        :root {
            --bg: #000; --surf: #1C1C1E; --prim: #0A84FF; --text: #fff; --muted: #8E8E93;
            --success: #32D74B; --danger: #FF453A; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .header { padding: 40px 16px 20px; background: var(--surf); border-bottom: 0.5px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
        .stat-card span { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; }
        .stat-card b { font-size: 18px; color: var(--prim); }

        .view { padding: 16px; display: none; }
        .view.active { display: block; }

        .card { background: var(--surf); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 0.5px solid var(--border); }
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #2C2C2E; border: none; border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; }

        .photo-picker { width: 100%; height: 150px; background: #2C2C2E; border: 2px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .photo-picker img { width: 100%; height: 100%; object-fit: cover; }

        .order-item { display: flex; gap: 12px; align-items: center; }
        .order-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: #2C2C2E; }
        .order-info { flex: 1; }
        .order-info h4 { font-size: 15px; margin-bottom: 4px; }
        .order-info p { font-size: 12px; color: var(--muted); }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge.transit { background: rgba(10,132,255,0.2); color: var(--prim); }
        .badge.debt { background: rgba(255,69,58,0.2); color: var(--danger); }
        .badge.paid { background: rgba(50,215,75,0.2); color: var(--success); }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28,28,30,0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 env(safe-area-inset-bottom); border-top: 0.5px solid var(--border); }
        .nav-item { color: var(--muted); text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--prim); }
        .btn { background: var(--prim); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="user-name">Biz: Abdurauf</h1>
        <div class="stats-grid">
            <div class="stat-card"><span>Оборот (всего)</span><b id="stat-turnover">0</b></div>
            <div class="stat-card"><span>Долг мамы</span><b id="stat-debt" style="color: var(--danger);">0</b></div>
            <div class="stat-card"><span>В пути (шт)</span><b id="stat-transit">0</b></div>
            <div class="stat-card"><span>Прибыль</span><b id="stat-profit" style="color: var(--success);">0</b></div>
        </div>
    </div>

    <div id="view-add" class="view active">
        <div class="card">
            <div class="photo-picker" onclick="document.getElementById('fileInput').click()">
                <span id="photo-label">📸 Нажми, чтобы сделать фото</span>
                <img id="photo-preview" style="display:none">
                <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="previewPhoto(this)">
            </div>
            <div class="input-group">
                <label>Кол-во и Цена за шт (Юань)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="q-qty" placeholder="Кол-во">
                    <input type="number" id="q-price" placeholder="Цена ¥">
                </div>
            </div>
            <div class="input-group">
                <label>Тип товара (для веса)</label>
                <select id="q-type">
                    <option value="0.08">Шелк 90х90 (~80г)</option>
                    <option value="0.03">Шелк 50х50 (~30г)</option>
                    <option value="0.15">Хлопок (~150г)</option>
                    <option value="0.3">Кашемир (~300г)</option>
                </select>
            </div>
            <button class="btn" onclick="saveOrder()">Заказать платки</button>
        </div>
    </div>

    <div id="view-orders" class="view">
        <div id="orders-list"></div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="switchView('add')">➕ Заказ</a>
        <a href="#" class="nav-item" onclick="switchView('orders')">📦 Мои платки</a>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('rumol_db')) || { orders: [], rate: 1.48 };
        let currentPhoto = "";

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    currentPhoto = e.target.result;
                    document.getElementById('photo-preview').src = currentPhoto;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('photo-label').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveOrder() {
            const qty = Number(document.getElementById('q-qty').value);
            const priceY = Number(document.getElementById('q-price').value);
            const weightUnit = Number(document.getElementById('q-type').value);
            
            if(!qty || !priceY) return alert("Заполни данные!");

            const costTJS = qty * priceY * db.rate;
            const deliveryTJS = (qty * weightUnit) * 30; // 30с за кг (авто)

            const newOrder = {
                id: Date.now(),
                photo: currentPhoto,
                qty: qty,
                cost: (costTJS + deliveryTJS).toFixed(2),
                status: 'transit', // transit, arrived, debt, paid
                date: new Date().toLocaleDateString()
            };

            db.orders.unshift(newOrder);
            localStorage.setItem('rumol_db', JSON.stringify(db));
            alert("Заказ добавлен в путь!");
            location.reload();
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            list.innerHTML = db.orders.map(o => `
                <div class="card order-item">
                    <img src="${o.photo || 'https://via.placeholder.com/80'}" class="order-img">
                    <div class="order-info">
                        <h4>Заказ от ${o.date}</h4>
                        <p>${o.qty} шт • Себест: ${o.cost} TJS</p>
                        <div style="margin-top:8px;">
                            ${getStatusBadge(o)}
                        </div>
                    </div>
                    <div>
                        ${o.status === 'transit' ? `<button onclick="updateStatus(${o.id}, 'arrived')" style="font-size:10px; padding:5px;">Пришло</button>` : ''}
                        ${o.status === 'arrived' ? `<button onclick="markAsDebt(${o.id})" style="background:var(--danger); font-size:10px; padding:5px; color:white; border-radius:5px; border:none;">Маме</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getStatusBadge(o) {
            if(o.status === 'transit') return `<span class="badge transit">В ПУТИ</span>`;
            if(o.status === 'arrived') return `<span class="badge">НА СКЛАДЕ</span>`;
            if(o.status === 'debt') return `<span class="badge debt">ДОЛГ МАМЫ</span>`;
            return `<span class="badge paid">ОПЛАЧЕНО</span>`;
        }

        function updateStatus(id, status) {
            db.orders = db.orders.map(o => o.id === id ? {...o, status} : o);
            localStorage.setItem('rumol_db', JSON.stringify(db));
            render();
        }

        function markAsDebt(id) {
            let sellPrice = prompt("За сколько (всего) отдаешь маме эту партию?", "600");
            if(!sellPrice) return;
            db.orders = db.orders.map(o => o.id === id ? {...o, status: 'debt', sellPrice: Number(sellPrice)} : o);
            localStorage.setItem('rumol_db', JSON.stringify(db));
            render();
        }

        function renderStats() {
            const totalTurnover = db.orders.reduce((sum, o) => sum + Number(o.cost), 0);
            const totalDebt = db.orders.filter(o => o.status === 'debt').reduce((sum, o) => sum + Number(o.sellPrice), 0);
            const transitCount = db.orders.filter(o => o.status === 'transit').reduce((sum, o) => sum + o.qty, 0);
            
            document.getElementById('stat-turnover').innerText = totalTurnover.toFixed(0) + ' с.';
            document.getElementById('stat-debt').innerText = totalDebt.toFixed(0) + ' с.';
            document.getElementById('stat-transit').innerText = transitCount;
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function render() { renderStats(); renderOrders(); }
        render();
    </script>
</body>
</html>
